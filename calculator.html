<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f0f11;
    font-family: 'IBM Plex Mono', monospace;
    padding: 1rem;
  }

  .calc-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .calc-label {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: #444;
    text-transform: uppercase;
  }

  .calculator {
    background: #1a1a1f;
    border: 1px solid #2a2a30;
    border-radius: 20px;
    padding: 1.5rem;
    width: 320px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
  }

  /* DISPLAY */
  .display {
    background: #111114;
    border: 1px solid #222226;
    border-radius: 12px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.25rem;
    text-align: right;
    min-height: 88px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .display-history {
    font-size: 0.75rem;
    color: #444;
    min-height: 1.2rem;
    margin-bottom: 0.25rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    direction: rtl;
  }

  .display-current {
    font-size: 2.2rem;
    font-weight: 600;
    color: #f0f0f0;
    line-height: 1.1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    direction: rtl;
    transition: font-size 0.1s;
  }

  .display-current.small { font-size: 1.4rem; }

  /* BUTTONS GRID */
  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.6rem;
  }

  button {
    border: none;
    border-radius: 10px;
    padding: 1rem 0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1rem;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.12s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    overflow: hidden;
  }

  /* Ripple */
  button::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.15s;
  }
  button:active::after { background: rgba(255,255,255,0.08); }
  button:active { transform: scale(0.96); }

  /* Number keys */
  .btn-num {
    background: #252529;
    color: #e0e0e0;
    border: 1px solid #2e2e34;
  }
  .btn-num:hover { background: #2d2d32; border-color: #3a3a42; }

  /* Operator keys */
  .btn-op {
    background: #2a2a40;
    color: #7c7cff;
    border: 1px solid #33334a;
    font-weight: 600;
    font-size: 1.1rem;
  }
  .btn-op:hover { background: #31314a; }

  /* Function keys (clear, backspace, sign, percent) */
  .btn-fn {
    background: #222226;
    color: #888;
    border: 1px solid #2a2a2e;
    font-size: 0.85rem;
  }
  .btn-fn:hover { background: #29292f; color: #aaa; }

  /* Equals */
  .btn-eq {
    background: #4f46e5;
    color: #fff;
    border: 1px solid #4338ca;
    font-size: 1.3rem;
    font-weight: 600;
  }
  .btn-eq:hover { background: #5a51f0; }
  .btn-eq:active { transform: scale(0.95); }

  /* Zero button spans 2 columns */
  .span2 { grid-column: span 2; text-align: left; padding-left: 1.5rem; }

  /* History panel */
  .history-panel {
    width: 320px;
    background: #1a1a1f;
    border: 1px solid #2a2a30;
    border-radius: 12px;
    padding: 0;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, padding 0.3s ease;
  }
  .history-panel.open {
    max-height: 200px;
    padding: 1rem 1.25rem;
  }
  .history-panel h4 { font-size: 0.7rem; letter-spacing: 0.15em; color: #444; text-transform: uppercase; margin-bottom: 0.75rem; }
  .history-list { list-style: none; }
  .history-list li {
    font-size: 0.82rem;
    color: #555;
    padding: 0.3rem 0;
    border-bottom: 1px solid #222;
    display: flex;
    justify-content: space-between;
  }
  .history-list li span:last-child { color: #888; }
  .history-list:empty::after { content: 'No history yet'; font-size: 0.8rem; color: #333; display: block; text-align: center; padding: 0.5rem 0; }

  .toggle-history {
    background: transparent;
    border: 1px solid #2a2a30;
    color: #444;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    padding: 0.4rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .toggle-history:hover { color: #888; border-color: #444; }
  .toggle-history:active { transform: none; }
</style>
</head>
<body>

<div class="calc-wrapper">
  <div class="calc-label">Calculator</div>

  <div class="calculator">
    <div class="display">
      <div class="display-history" id="history"></div>
      <div class="display-current" id="current">0</div>
    </div>

    <div class="buttons">
      <!-- Row 1 -->
      <button class="btn-fn" onclick="clearAll()">AC</button>
      <button class="btn-fn" onclick="toggleSign()">+/−</button>
      <button class="btn-fn" onclick="percent()">%</button>
      <button class="btn-op" onclick="setOp('/')">÷</button>

      <!-- Row 2 -->
      <button class="btn-num" onclick="input('7')">7</button>
      <button class="btn-num" onclick="input('8')">8</button>
      <button class="btn-num" onclick="input('9')">9</button>
      <button class="btn-op" onclick="setOp('*')">×</button>

      <!-- Row 3 -->
      <button class="btn-num" onclick="input('4')">4</button>
      <button class="btn-num" onclick="input('5')">5</button>
      <button class="btn-num" onclick="input('6')">6</button>
      <button class="btn-op" onclick="setOp('-')">−</button>

      <!-- Row 4 -->
      <button class="btn-num" onclick="input('1')">1</button>
      <button class="btn-num" onclick="input('2')">2</button>
      <button class="btn-num" onclick="input('3')">3</button>
      <button class="btn-op" onclick="setOp('+')">+</button>

      <!-- Row 5 -->
      <button class="btn-num span2" onclick="input('0')">0</button>
      <button class="btn-num" onclick="inputDot()">.</button>
      <button class="btn-eq" onclick="calculate()">=</button>
    </div>
  </div>

  <button class="toggle-history" onclick="toggleHistory()">▾ History</button>

  <div class="history-panel" id="historyPanel">
    <h4>Recent Calculations</h4>
    <ul class="history-list" id="historyList"></ul>
  </div>
</div>

<script>
  let current = '0';
  let prev = null;
  let op = null;
  let justCalc = false;
  let historyItems = [];

  const currentEl = document.getElementById('current');
  const historyEl = document.getElementById('history');

  function updateDisplay() {
    currentEl.textContent = current;
    currentEl.classList.toggle('small', current.length > 10);
  }

  function input(digit) {
    if (justCalc) { current = digit; justCalc = false; }
    else if (current === '0') current = digit;
    else if (current.length < 12) current += digit;
    updateDisplay();
  }

  function inputDot() {
    if (justCalc) { current = '0.'; justCalc = false; }
    else if (!current.includes('.')) current += '.';
    updateDisplay();
  }

  function setOp(o) {
    if (op && !justCalc) calculate(true);
    prev = parseFloat(current);
    op = o;
    const opSymbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
    historyEl.textContent = `${format(prev)} ${opSymbols[o]}`;
    justCalc = false;
    current = '0';
    updateDisplay();
  }

  function calculate(chain = false) {
    if (op === null || prev === null) return;
    const a = prev;
    const b = parseFloat(current);
    const opSymbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
    let result;
    switch (op) {
      case '+': result = a + b; break;
      case '-': result = a - b; break;
      case '*': result = a * b; break;
      case '/': result = b === 0 ? 'Error' : a / b; break;
    }

    const expr = `${format(a)} ${opSymbols[op]} ${format(b)}`;
    if (!chain) {
      historyEl.textContent = `${expr} =`;
      addHistory(expr, result);
    }

    current = result === 'Error' ? 'Error' : format(result);
    if (!chain) { op = null; prev = null; justCalc = true; }
    updateDisplay();
  }

  function format(n) {
    if (typeof n !== 'number') return n;
    if (!isFinite(n)) return 'Error';
    const s = parseFloat(n.toFixed(10)).toString();
    return s;
  }

  function clearAll() {
    current = '0'; prev = null; op = null; justCalc = false;
    historyEl.textContent = '';
    updateDisplay();
  }

  function toggleSign() {
    if (current === '0' || current === 'Error') return;
    current = current.startsWith('-') ? current.slice(1) : '-' + current;
    updateDisplay();
  }

  function percent() {
    const n = parseFloat(current);
    if (isNaN(n)) return;
    current = format(n / 100);
    updateDisplay();
  }

  function addHistory(expr, result) {
    historyItems.unshift({ expr, result: format(result) });
    if (historyItems.length > 10) historyItems.pop();
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    list.innerHTML = historyItems.map(h =>
      `<li><span>${h.expr}</span><span>= ${h.result}</span></li>`
    ).join('');
  }

  function toggleHistory() {
    const panel = document.getElementById('historyPanel');
    panel.classList.toggle('open');
    document.querySelector('.toggle-history').textContent =
      panel.classList.contains('open') ? '▴ History' : '▾ History';
  }

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') input(e.key);
    else if (e.key === '.') inputDot();
    else if (e.key === '+') setOp('+');
    else if (e.key === '-') setOp('-');
    else if (e.key === '*') setOp('*');
    else if (e.key === '/') { e.preventDefault(); setOp('/'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Backspace') {
      if (justCalc) { clearAll(); return; }
      current = current.length > 1 ? current.slice(0, -1) : '0';
      updateDisplay();
    }
    else if (e.key === 'Escape') clearAll();
    else if (e.key === '%') percent();
  });
</script>
</body>
</html>
